# Build APK Android sur push main + tag v*
name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cleanup React 19 RC sub-deps from jest-expo
        run: |
          rm -rf node_modules/jest-expo/node_modules/react
          rm -rf node_modules/jest-expo/node_modules/react-dom
          rm -rf node_modules/jest-expo/node_modules/react-server-dom-webpack
          rm -rf node_modules/jest-expo/node_modules/react-test-renderer
          rm -rf node_modules/jest-expo/node_modules/@types/react

      - name: Disable New Architecture (Bridgeless)
        run: |
          node -e "const f='app.json';const j=JSON.parse(require('fs').readFileSync(f));j.expo.newArchEnabled=false;require('fs').writeFileSync(f,JSON.stringify(j,null,2));"

      - name: Expo prebuild
        env:
          CI: '1'
        run: npx expo prebuild --platform android --clean

      - name: Bundle JS (embedded, no Metro)
        run: |
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Rename APK with short sha
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/${{ github.event.repository.name }}-${SHORT_SHA}.apk
          ls -la android/app/build/outputs/apk/debug/

      - name: Publish "latest" GH Release on every main push (overwrite)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest debug APK"
          body: |
            Auto-generated debug APK for the latest commit on `main`.
            Built from sha: ${{ github.sha }}
            Direct download: https://github.com/${{ github.repository }}/releases/download/latest/app-debug.apk
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/${{ github.event.repository.name }}-*.apk
          prerelease: true
          make_latest: false
