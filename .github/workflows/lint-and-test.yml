# Lint + tests Jest sur PR + push main
name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install --legacy-peer-deps

      - name: Cleanup React 19 RC sub-deps
        run: |
          rm -rf node_modules/jest-expo/node_modules/react
          rm -rf node_modules/jest-expo/node_modules/react-dom
          rm -rf node_modules/jest-expo/node_modules/react-server-dom-webpack
          rm -rf node_modules/jest-expo/node_modules/react-test-renderer

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npx eslint . --max-warnings=200
        continue-on-error: true

      - name: Test
        run: npm test -- --passWithNoTests
